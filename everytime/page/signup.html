<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>에브리타임 회원가입</title>
    <link rel="stylesheet" href="../css/signup.css" />
  </head>
  <body>
    <div class="signup-container">
      <h2>에브리타임 회원가입</h2>
      <p>
        에브리타임 계정으로 <strong>캠퍼스픽, 에브리타임</strong> 등<br />다양한
        대학생 서비스를 모두 이용하실 수 있습니다.
      </p>

      <form id="signupForm" onsubmit="event.preventDefault()">
        <div class="input-group">
          <label>이름</label>
          <input type="text" id="regName" placeholder="이름을 입력하세요" />
        </div>

        <div class="input-group">
          <label>닉네임</label>
          <input
            type="text"
            id="regNickname"
            placeholder="닉네임을 입력하세요"
          />
        </div>

        <div class="input-group">
          <label>이메일</label>
          <input type="email" id="regEmail" placeholder="이메일을 입력하세요" />
        </div>

        <div class="input-group">
          <label>비밀번호</label>
          <input type="password" id="regPw" placeholder="비밀번호 (8자 이상)" />
        </div>

        <div class="input-group">
          <label>비밀번호 확인</label>
          <input
            type="password"
            id="regPwConfirm"
            placeholder="비밀번호 확인"
          />
        </div>

        <input type="submit" id="signupBtn" value="회원가입" disabled />
      </form>
    </div>

    <script src="../JS/signup.js"></script>
  </body>
</html>
