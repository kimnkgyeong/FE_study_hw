<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>에브리타임 글 작성</title>
    <link rel="stylesheet" href="post.css" />
  </head>
  <body>
    <div id="writeCollapsed" class="write-collapsed">새 글을 작성해주세요!</div>

    <div id="writeExpanded" class="write-expanded hidden">
      <input type="text" placeholder="글 제목" />
      <textarea placeholder="내용을 입력하세요..."></textarea>

      <div class="checkbox-container">
        <input type="checkbox" id="questionCheck" />
        <label for="questionCheck">질문</label>
      </div>

      <button type="submit">작성</button>

      <div id="questionInfoBox" class="info-box hidden">
        <p>질문 글을 작성하면 게시판 상단에 일정 기간 노출되어...</p>
      </div>
    </div>

    <script src="post.js"></script>
  </body>
</html>
